worker_processes 1;
pid        /tmp/nginx.pid;
error_log  /tmp/nginx_logs/error.log warn;

events {
    worker_connections 1024;
}

http {
    access_log        /tmp/nginx_logs/access.log;
    client_body_temp_path /tmp/nginx_body;
    proxy_temp_path       /tmp/nginx_proxy;

    server {
        listen 7860;
        server_name _;

        # ── /predict → lightweight HTTP predict server on :8000 ──────────────
        location /predict {
            proxy_pass         http://127.0.0.1:8000/predict;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_read_timeout 30s;

            # CORS — belt-and-suspenders (server also sends these headers)
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── everything else → Streamlit on :8501 ─────────────────────────────
        location / {
            proxy_pass         http://127.0.0.1:8501;
            proxy_http_version 1.1;

            # WebSocket support (Streamlit uses WS for live updates)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}